services:
  - type: web
    name: permitrack
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LEAVE_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: mysql+pymysql://user:password@host:port/database
      - key: MAIL_SERVER
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USE_SSL
        value: "false"
      - key: MAIL_BACKEND
        value: brevo_api
      - key: MAIL_USERNAME
        value: your-brevo-login@smtp-brevo.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: your-verified-sender@example.com
      - key: BREVO_SENDER_NAME
        value: PermiTrack
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_API_URL
        value: https://api.brevo.com/v3/smtp/email
      - key: MAIL_DELIVERY_MODE
        value: sync
      - key: STORAGE_BACKEND
        value: local
      - key: INITDB_TOKEN
        generateValue: true
