services:
  - type: web
    name: permitrack
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LEAVE_SECRET
        generateValue: true
      # Database Configuration (Update these with your actual database details)
      - key: DATABASE_URL
        value: mysql+pymysql://user:password@host:port/database
      # Email Configuration - Using SendGrid (RECOMMENDED for Render)
      # 1. Get API key from https://sendgrid.com (free account, 100 emails/day)
      # 2. Go to Settings → API Keys → Create API Key
      # 3. Copy the key (starts with SG.) and paste in MAIL_PASSWORD below
      - key: MAIL_SERVER
        value: smtp.sendgrid.net
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USE_SSL
        value: "false"
      - key: MAIL_USERNAME
        value: apikey
      - key: MAIL_PASSWORD
        value: ${SENDGRID_API_KEY}
      - key: MAIL_DEFAULT_SENDER
        value: noreply@permitrack.com
      - key: MAIL_DELIVERY_MODE
        value: sync
      # Storage Configuration (for file uploads)
      - key: STORAGE_BACKEND
        value: local  # or s3, oci for production
      # Other production settings
      - key: INITDB_TOKEN
        generateValue: true
