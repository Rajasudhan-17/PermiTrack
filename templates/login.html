
{% block content %}
<div class="login-container">
  <div class="login-card">
    <div class="login-image">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" alt="Login Illustration" />
    </div>
    <div class="login-header">
      <h2>Login</h2>
      <p class="login-subtitle">Welcome back! Please enter your credentials</p>
    </div>
    <form method="post" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-container">
          <i class="fas fa-user"></i>
          <input id="username" name="username" type="text" placeholder="Enter your username" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-container">
          <i class="fas fa-lock"></i>
          <input id="password" name="password" type="password" placeholder="Enter your password" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="login-button">Login</button>
      </div>
    </form>
  </div>
</div>

<style>
  /* Light Blue Theme Login Form Styling */
  :root {
    --primary-color: #3a8dde; /* lighter blue */
    --primary-hover: #2c6fb1;
    --text-color: #1a2e4a;
    --light-text: #5a7cae;
    --bg-color: #e6f0fa;
    --card-bg: #ffffff;
    --border-color: #c3d4f7;
    --shadow: 0 8px 24px rgba(58, 141, 222, 0.2);
    --input-bg: #f0f6ff;
  }

  .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
    background-color: var(--bg-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    background-color: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 28px rgba(58, 141, 222, 0.28);
  }

  .login-image {
    text-align: center;
    margin-bottom: 25px;
  }

  .login-image img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(58, 141, 222, 0.15);
  }

  .login-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .login-header h2 {
    color: var(--text-color);
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .login-subtitle {
    color: var(--light-text);
    font-size: 14px;
    margin: 0;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-color);
  }

  .input-container {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-container i {
    position: absolute;
    left: 12px;
    color: var(--light-text);
    font-size: 16px;
  }

  .input-container input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background-color: var(--input-bg);
    font-size: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
    color: var(--text-color);
  }

  .input-container input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(58, 141, 222, 0.15);
  }

  .input-container input::placeholder {
    color: #aab;
  }

  .form-actions {
    margin-top: 10px;
  }

  .login-button {
    width: 100%;
    padding: 12px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.2s;
  }

  .login-button:hover {
    background-color: var(--primary-hover);
  }

  .login-button:active {
    transform: scale(0.98);
  }

  /* Responsive adjustments */
  @media (max-width: 480px) {
    .login-card {
      padding: 30px 20px;
    }
  }
</style>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
{% endblock %}
