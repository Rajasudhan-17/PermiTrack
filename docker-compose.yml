services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: permitrack
      MYSQL_USER: permitrack_app
      MYSQL_PASSWORD: permitrack_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  web:
    build: .
    depends_on:
      - mysql
    env_file:
      - .env.production.example
    environment:
      APP_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: permitrack
      MYSQL_USER: permitrack_app
      MYSQL_PASSWORD: permitrack_password
      STORAGE_BACKEND: local
      AWS_S3_BUCKET: ""
      SESSION_COOKIE_SECURE: "false"
      TRUST_PROXY: "false"
    ports:
      - "8000:8000"

volumes:
  mysql_data:
